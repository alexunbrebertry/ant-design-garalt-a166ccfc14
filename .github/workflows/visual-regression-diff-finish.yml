name: "\U0001F440 Visual Regression Diff Finish"
permissions:
  contents: read
jobs:
  upstream-workflow-summary:
    name: upstream workflow summary
    runs-on: ubuntu-latest
    outputs:
      jobs: ${{ steps.visual_diff_build_job_status.outputs.result }}
      upstream-job-link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
        github.event.workflow_run.id }}/job/${{ steps.visual_diff_build_job_status.outputs.job-id
        }}
      build-status: ${{ steps.visual_diff_build_job_status.outputs.build-status }}
    steps:
    - name: summary jobs status
      uses: actions/github-script@v8
      id: visual_diff_build_job_status
      with:
        script: "const response = await github.rest.actions.listJobsForWorkflowRun({\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  run_id: ${{\
          \ github.event.workflow_run.id }},\n});\n\n// { [name]: [conclusion] },\
          \ e.g. { 'test image': 'success' }\nconst jobs = (response.data?.jobs ??\
          \ []).reduce((acc, job) => {\n  if(job?.status === 'completed' && 'name'\
          \ in job && 'conclusion' in job) {\n    acc[job.name] = {\n      id: job.id,\n\
          \      status: job.conclusion,\n    };\n  }\n  return acc;\n}, {});\n\n\
          const total = Object.keys(jobs).length;\nif (total === 0) {\n  core.setFailed('no\
          \ jobs found');\n}\n\n// the name here must be the same as `jobs.xxx.{name}`\n\
          console.log('visual-diff report job status: %s', jobs['visual-diff report'].status);\n\
          \n// set output\ncore.setOutput('job-id', jobs['visual-diff report'].id);\n\
          core.setOutput('build-status', jobs['visual-diff report'].status);\nreturn\
          \ jobs;\n"
  download-visual-regression-report:
    name: download visual-regression report
    permissions:
      actions: read
      issues: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    needs:
    - upstream-workflow-summary
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - name: download image snapshot artifact
      uses: dawidd6/action-download-artifact@v14
      with:
        workflow: ${{ github.event.workflow_run.workflow_id }}
        run_id: ${{ github.event.workflow_run.id }}
        name: visual-regression-diff-ref
        path: ./tmp
    - name: save PR id
      id: pr
      run: "pr_id=$(<tmp/visual-regression-pr-id.txt)\nif ! [[ \"$pr_id\" =~ ^[0-9]+$\
        \ ]]; then\n  echo \"Error: pr-id.txt does not contain a valid numeric PR\
        \ id. Please check.\"\n  exit 1\nfi\necho \"id=$pr_id\" >> $GITHUB_OUTPUT\n"
    - name: GARALT debug probe
      run: 'GARALT_DBG_PR_ID="$(cat tmp/visual-regression-pr-id.txt 2>/dev/null ||
        echo ''NOT_FOUND'')"

        printf ''GARALT_DBG: pr_id=%s\n'' "$GARALT_DBG_PR_ID"'
    - name: download report artifact
      id: download_report
      if: ${{ needs.upstream-workflow-summary.outputs.build-status == 'success' ||
        needs.upstream-workflow-summary.outputs.build-status == 'failure' }}
      uses: dawidd6/action-download-artifact@v14
      with:
        workflow: ${{ github.event.workflow_run.workflow_id }}
        run_id: ${{ github.event.workflow_run.id }}
        name: visual-regression-report
        path: ./tmp
    - name: GARALT debug probe
      run: "GARALT_DBG_TARBALL=\"$(ls -la tmp/visualRegressionReport.tar.gz 2>/dev/null\
        \ || echo 'NOT_FOUND')\"\nprintf 'GARALT_DBG: tarball_path=%s\\n' \"$GARALT_DBG_TARBALL\"\
        \nif [ -f tmp/visualRegressionReport.tar.gz ]; then\n  GARALT_DBG_TAR_LIST=\"\
        $(tar -tzf tmp/visualRegressionReport.tar.gz 2>/dev/null || echo 'LIST_FAILED')\"\
        \n  printf 'GARALT_DBG: tarball_contents\\n%s\\n' \"$GARALT_DBG_TAR_LIST\"\
        \nfi"
    - name: upload visual-regression report
      id: report
      env:
        ALI_OSS_AK_ID: ${{ secrets.ALI_OSS_AK_ID }}
        ALI_OSS_AK_SECRET: ${{ secrets.ALI_OSS_AK_SECRET }}
        PR_ID: ${{ steps.pr.outputs.id }}
      run: "mkdir ./visualRegressionReport\ntar -xzvf tmp/visualRegressionReport.tar.gz\
        \ -C ./visualRegressionReport\necho \"\u2705 Uncompress Finished\"\n\nrm package.json\n\
        npm i ali-oss --no-save\necho \"\u2705 Install `ali-oss` Finished\"\n\necho\
        \ \"\U0001F916 Uploading\"\nnode scripts/visual-regression/upload.js ./visualRegressionReport\
        \ --ref=pr-$PR_ID\necho \"\u2705 Uploaded\"\n\ndelimiter=\"$(openssl rand\
        \ -hex 8)\"\necho \"content<<${delimiter}\" >> \"${GITHUB_OUTPUT}\"\necho\
        \ \"$(<visualRegressionReport/report.md)\" >> \"${GITHUB_OUTPUT}\"\necho \"\
        ${delimiter}\" >> \"${GITHUB_OUTPUT}\"\n"
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - "\U0001F440 Visual Regression Diff Build"
    types:
    - completed
