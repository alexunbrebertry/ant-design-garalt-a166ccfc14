name: "\U0001F440 Visual Regression Diff Build"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  visual-diff-snapshot:
    name: visual-diff snapshot
    strategy:
      matrix:
        shard:
        - 1/2
        - 2/2
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - run: ut
    - name: generate image snapshots
      id: test-image
      run: 'node node_modules/puppeteer/install.mjs

        ut version

        ut test:image -- --shard=${{matrix.shard}}

        '
      env:
        NODE_OPTIONS: --max_old_space_size=4096
    - uses: actions/upload-artifact@v4
      name: artifact snapshot
      with:
        name: snapshot-artifacts-${{ strategy.job-index }}
        path: imageSnapshots/
        retention-days: 2
  visual-diff-report:
    name: visual-diff report
    runs-on: ubuntu-latest
    needs: visual-diff-snapshot
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - run: ut
    - uses: actions/download-artifact@v7
      with:
        pattern: snapshot-artifacts-*
        merge-multiple: true
        path: imageSnapshots/
    - name: visual regression diff
      env:
        EVENT_NUMBER: ${{ github.event.number }}
        BASE_REF: ${{ github.base_ref }}
      run: 'ut test:visual-regression -- --pr-id=$EVENT_NUMBER --base-ref=$BASE_REF
        --max-workers=2

        '
    - name: GARALT debug probe
      run: 'GARALT_DBG_ARTIFACT="$(ls -la visualRegressionReport.tar.gz 2>/dev/null
        || echo ''NOT_FOUND'')"

        printf ''GARALT_DBG: tarball_exists=%s\n'' "$GARALT_DBG_ARTIFACT"

        printf ''GARALT_DBG: event_number=%s\n'' "${{ github.event.number }}"'
    - name: upload report artifact
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: visual-regression-report
        path: visualRegressionReport.tar.gz
    - name: Save persist key
      if: ${{ always() }}
      run: echo ${{ github.event.number }} > ./visual-regression-pr-id.txt
    - name: Upload persist key
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-diff-ref
        path: ./visual-regression-pr-id.txt
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    branches:
    - master
    - feature
    - next
    types:
    - opened
    - synchronize
    - reopened
