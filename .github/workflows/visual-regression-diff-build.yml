name: "\U0001F440 Visual Regression Diff Build"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  visual-diff-snapshot:
    name: visual-diff snapshot
    strategy:
      matrix:
        shard:
        - 1/2
        - 2/2
    runs-on: &id001
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-efd3
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - name: generate image snapshots
      id: test-image
      run: 'node node_modules/puppeteer/install.mjs

        ut version

        ut test:image -- --shard=${{matrix.shard}}

        '
      env:
        NODE_OPTIONS: --max_old_space_size=4096
    - uses: actions/upload-artifact@v4
      name: artifact snapshot
      with:
        name: snapshot-artifacts-${{ strategy.job-index }}
        path: imageSnapshots/
        retention-days: 2
  visual-diff-report:
    name: visual-diff report
    runs-on: *id001
    needs: visual-diff-snapshot
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - uses: actions/download-artifact@v7
      with:
        pattern: snapshot-artifacts-*
        merge-multiple: true
        path: imageSnapshots/
    - name: GARALT debug probe
      run: 'GARALT_DBG_PR_NUM=''${{ toJSON(github.event.number) }}''

        GARALT_DBG_BASE_REF=''${{ toJSON(github.base_ref) }}''

        printf ''GARALT_DBG: visual regression diff about to run (PR #%s, base: %s)\n''
        "$GARALT_DBG_PR_NUM" "$GARALT_DBG_BASE_REF"

        printf ''GARALT_DBG: Attacker PR code is checked out and will control this
        step\n'''
    - name: visual regression diff
      env:
        EVENT_NUMBER: ${{ github.event.number }}
        BASE_REF: ${{ github.base_ref }}
      run: 'ut test:visual-regression -- --pr-id=$EVENT_NUMBER --base-ref=$BASE_REF
        --max-workers=2

        '
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: Checking for attacker-controlled tarball before upload\n''

        ls -la visualRegressionReport.tar.gz 2>/dev/null && printf ''GARALT_DBG: tarball
        exists and will be uploaded as artifact\n'' || printf ''GARALT_DBG: tarball
        not found at expected path\n'''
    - name: upload report artifact
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: visual-regression-report
        path: visualRegressionReport.tar.gz
    - name: Save persist key
      if: ${{ always() }}
      run: echo ${{ github.event.number }} > ./visual-regression-pr-id.txt
    - name: Upload persist key
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-diff-ref
        path: ./visual-regression-pr-id.txt
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    branches:
    - master
    - feature
    - next
    types:
    - opened
    - synchronize
    - reopened
